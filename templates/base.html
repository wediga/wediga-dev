<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}wediga.dev{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: { 900: '#08080c', 800: '#0e0e14', 700: '#16161e', 600: '#1e1e28' },
                        amber: { 400: '#e2b55a', 500: '#d4a44c', 600: '#c9953c', 700: '#a87a2f' },
                        parchment: { 100: '#ede9e0', 200: '#d8d2c6', 300: '#b0a898', 400: '#8a8270' }
                    },
                    fontFamily: {
                        display: ['Cinzel', 'serif'],
                        body: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #08080c;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(212, 164, 76, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(212, 164, 76, 0.02) 0%, transparent 40%);
        }
        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            z-index: 50;
        }
        .glow-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 164, 76, 0.4), transparent);
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fadeUp 0.6s ease-out forwards;
            opacity: 0;
        }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }
        .delay-6 { animation-delay: 0.6s; }
        .delay-7 { animation-delay: 0.7s; }
        /* Subtle amber underline on hover */
        .link-glow {
            position: relative;
            transition: color 0.3s ease;
        }
        .link-glow::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0;
            width: 0; height: 1px;
            background: #d4a44c;
            transition: width 0.3s ease;
        }
        .link-glow:hover::after { width: 100%; }
        .link-glow:hover { color: #e2b55a; }
        /* D20 spin on hover */
        .d20-spin:hover svg { transform: rotate(60deg); }
        .d20-spin svg { transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        /* Prose styling for about section */
        .prose-arcane p { margin-bottom: 1.2em; line-height: 1.75; }
        .prose-arcane h1 { display: none; }
        .prose-arcane strong { color: #e2b55a; font-weight: 500; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="text-parchment-100 min-h-screen flex flex-col antialiased">
    <div class="noise-overlay"></div>
    <main class="flex-grow relative z-10">
        {% block content %}{% endblock %}
    </main>
    <footer class="relative z-10 text-center py-8">
        {% block footer %}{% endblock %}
    </footer>
</body>
</html>
